substitutions:
  fw_version: "1.0.0"
  # ESP32-C6 
  # ANPASSUNG DER DIAGNOSE-GRENZWERTE
  diag_min_heap_ok: "80000"        # Mindestens 80 KB freien RAM erwarten wir im Normalbetrieb
  diag_min_heap_critical: "40000"   # Unter 40 KB wird es kritisch
    
esphome:
  name: wp-fp1-smartblock
  friendly_name: wp-fp1-smartblock
  project:
    name: "tsgwiro1.wp-fp1-smartblock"
    version: "${fw_version}"

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# Einbinden des gemeinsamen Diagnose-Files
packages:
  diagnostics: !include common/diagnostics.yaml

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# Webserver aktivieren
web_server:
  port: 80

# Globale Variablen für Logik und Fallbacks
globals:
  - id: api_connected
    type: bool
    initial_value: 'false'
  - id: api_disconnected_timer
    type: int
    initial_value: '0'
  - id: current_error
    type: int
    initial_value: '0'

# Enable Home Assistant API
api:
  encryption:
    key: !secret smartblock_api_key
  on_client_connected:
    - globals.set:
        id: api_connected
        value: 'true'
    - globals.set:
        id: api_disconnected_timer
        value: '0'
  on_client_disconnected:
    - globals.set:
        id: api_connected
        value: 'false'

ota:
  platform: esphome
  password: !secret smartblock_ota_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret smartblock_fallback_ap_ssid
    password: !secret smartblock_fallback_ap_password

logger:

captive_portal:

# ==========================================
# HARDWARE PINS & BUSSES
# ==========================================
spi:
  clk_pin: GPIO19
  mosi_pin: GPIO18

dallas:
  - pin: GPIO21

# ==========================================
# INTERNE OUTPUTS & RELAIS
# ==========================================
switch:
  # Das physische Relais (Nicht bedienbar in HA)
  - platform: gpio
    pin: GPIO22
    id: relais
    internal: true
    restore_mode: ALWAYS_OFF # Failsafe bei Neustart

  # Die Hintergrundbeleuchtung (Nicht bedienbar in HA)
  - platform: gpio
    pin: GPIO3
    id: backlight_switch
    internal: true
    restore_mode: ALWAYS_ON

# ==========================================
# ESPHOME SCHALTER (an HA gesendet)
# ==========================================
  # Hauptschalter
  - platform: template
    name: "Hauptschalter"
    id: hauptschalter
    entity_category: "config"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # Übersteuerung
  - platform: template
    name: "Übersteuerung"
    id: uebersteuerung
    entity_category: "config"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# ==========================================
# ESPHOME NUMBERS (Werte in HA einstellbar)
# ==========================================
number:
  # Schwellwert Slider
  - platform: template
    name: "Schwellwert"
    id: ha_schwellwert
    device_class: TEMPERATURE
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 15
    min_value: 0
    max_value: 40
    step: 1
    mode: slider
    unit_of_measurement: "°C"

  # Hysterese Slider
  - platform: template
    name: "Hysterese"
    id: ha_hysterese
    device_class: TEMPERATURE
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 2
    min_value: 0
    max_value: 10
    step: 1
    mode: slider
    unit_of_measurement: "°C"

  # Überhitzung Limit Slider
  - platform: template
    name: "Überhitzung Limit"
    id: ha_limit
    device_class: TEMPERATURE
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 50
    min_value: 30
    max_value: 80
    step: 1
    mode: slider
    unit_of_measurement: "°C"

# ==========================================
# LOKALE SENSOREN (LDR & DS18B20)
# ==========================================
sensor:
  # LDR Helligkeit (Lokal, gefiltert)
  - platform: adc
    pin: GPIO2
    id: ldr_sensor
    internal: true 
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
    on_value_range:
      - below: 0.4
        then:
          - switch.turn_off: backlight_switch
      - above: 0.6
        then:
          - switch.turn_on: backlight_switch

  # Innentemperatur
  - platform: dallas
    address: 0
    id: innen_temp
    name: "Gehäuse Temperatur"

# ==========================================
# HOME ASSISTANT SENSOREN (Importiert)
# ==========================================
  - platform: homeassistant
    id: wp_mitteltemperatur
    entity_id: sensor.wp_mitteltemperatur
    unit_of_measurement: "°C"

# ==========================================
# STATUS-RÜCKMELDUNGEN (Read-Only in HA)
# ==========================================
binary_sensor:
  - platform: template
    name: "Relais Status"
    lambda: 'return id(relais).state;'

  - platform: template
    name: "Backlight Status"
    entity_category: "diagnostic"
    lambda: 'return id(backlight_switch).state;'

# ==========================================
# HAUPTLOGIK (Prioritäten-Kaskade)
# ==========================================
interval:
  - interval: 1s
    then:
      - lambda: |-
          // 1. API Timer aktualisieren
          if (!id(api_connected)) {
            id(api_disconnected_timer) += 1;
          } else {
            id(api_disconnected_timer) = 0;
          }

          // 2. Variablen laden
          float t_innen = id(innen_temp).has_state() ? id(innen_temp).state : 20.0;
          float limit = id(ha_limit).state;
          float t_mittel = id(wp_mitteltemperatur).state; // NaN falls HA noch lädt
          float schwelle = id(ha_schwellwert).state;
          float hyst = id(ha_hysterese).state;
          
          bool fail_safe = false;
          bool target_relay_state = false; // false = Heizung steuert, true = Zwangsaus

          // --- PRIORITÄTEN-BAUM ---

          // Prio 1: Überhitzungsschutz
          if (t_innen > limit) {
            fail_safe = true;
            id(current_error) = 1;
          }
          // Prio 2: WLAN Ausfall
          else if (!wifi::global_wifi_component->is_connected()) {
            fail_safe = true;
            id(current_error) = 2;
          }
          // Prio 3: API Ausfall (> 1 Stunde / 3600s)
          else if (id(api_disconnected_timer) > 3600) {
            fail_safe = true;
            id(current_error) = 3;
          }
          // Prio 4: Hauptschalter AUS
          else if (!id(hauptschalter).state) {
            fail_safe = true;
            id(current_error) = 4;
          }
          // Prio 5: Übersteuerung EIN
          else if (id(uebersteuerung).state) {
            target_relay_state = true; 
            id(current_error) = 5;
          }
          // Prio 6: Automatik (Normalbetrieb)
          else {
            id(current_error) = 0;
            if (!isnan(t_mittel)) {
              if (t_mittel > schwelle) {
                target_relay_state = true; // Sommer, Pumpe aus
              } else if (t_mittel < (schwelle - hyst)) {
                target_relay_state = false; // Winter, Pumpe ein
              } else {
                target_relay_state = id(relais).state; // Hysterese-Band halten
              }
            } else {
              fail_safe = true;
              id(current_error) = 3; 
            }
          }

          // 3. Relais schalten
          if (fail_safe) {
            target_relay_state = false;
          }

          if (id(relais).state != target_relay_state) {
            if (target_relay_state) {
              id(relais).turn_on();
            } else {
              id(relais).turn_off();
            }
          }

# ==========================================
# DISPLAY & FONTS
# ==========================================
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 10
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: icons_xlarge
    size: 60
    glyphs:
      - "\U000F0E01"  # mdi:thermometer-alert
      - "\U000F05AA"  # mdi:wifi-off
      - "\U000F1257"  # mdi:api-off
      - "\U000F0425"  # mdi:power
      - "\U000F1B22"  # mdi:pump-off
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: icons_medium
    size: 40
    glyphs:
      - "\U000F05A8"  # mdi:white-balance-sunny
      - "\U000F0717"  # mdi:snowflake
      - "\U000F1B22"  # mdi:pump-off
      - "\U000F1402"  # mdi:pump

display:
  - platform: mipi_spi
    model: ST7735
    cs_pin: GPIO23 # Dummy Pin!
    dc_pin: GPIO5
    reset_pin: GPIO4
    dimensions:
      width: 80
      height: 160
      offset_width: 26
      offset_height: 1
    invert_colors: true
    color_order: bgr
    rotation: 0
    update_interval: 1s
    lambda: |-
      int err = id(current_error);
      int center_x = 80 / 2;
      int center_y = 160 / 2;
      
      it.fill(Color(0, 0, 0));

      if (err == 1) {
        it.printf(center_x, center_y, id(icons_xlarge), Color(255, 50, 50), TextAlign::CENTER, "\U000F0E01");
        it.printf(center_x, center_y + 50, id(font_large), Color(255, 180, 50), TextAlign::CENTER, "%.1f°C", id(innen_temp).state);
      } else if (err == 2) {
        it.printf(center_x, center_y, id(icons_xlarge), Color(255, 50, 50), TextAlign::CENTER, "\U000F05AA");
      } else if (err == 3) {
        it.printf(center_x, center_y, id(icons_xlarge), Color(255, 100, 50), TextAlign::CENTER, "\U000F1257");
      } else if (err == 4) {
        it.printf(center_x, center_y, id(icons_xlarge), Color(200, 200, 200), TextAlign::CENTER, "\U000F0425");
      } else if (err == 5) {
        it.printf(center_x, center_y, id(icons_xlarge), Color(255, 150, 0), TextAlign::CENTER, "\U000F1B22");
      } else {
        if (id(relais).state) {
          it.printf(center_x, 25, id(icons_medium), Color(255, 200, 0), TextAlign::CENTER, "\U000F05A8");
        } else {
          it.printf(center_x, 25, id(icons_medium), Color(100, 200, 255), TextAlign::CENTER, "\U000F0717");
        }

        if (id(wp_mitteltemperatur).has_state()) {
          it.printf(center_x, 70, id(font_large), Color(100, 255, 100), TextAlign::CENTER, "%.1f°C", id(wp_mitteltemperatur).state);
        } else {
          it.print(center_x, 70, id(font_large), Color(100, 255, 100), TextAlign::CENTER, "--.-°C");
        }

        float schwelle = id(ha_schwellwert).state;
        it.printf(center_x, 95, id(font_medium), Color(180, 180, 180), TextAlign::CENTER, "S: %.0f°C", schwelle);

        if (id(relais).state) {
          it.printf(center_x, 128, id(icons_medium), Color(180, 180, 180), TextAlign::CENTER, "\U000F1B22");
        } else {
          it.printf(center_x, 128, id(icons_medium), Color(180, 180, 180), TextAlign::CENTER, "\U000F1402");
        }

        if (id(innen_temp).has_state()) {
          it.printf(center_x, 158, id(font_tiny), Color(100, 100, 100), TextAlign::BASELINE_CENTER, "G: %.1f°C", id(innen_temp).state);
        }
      }